{% extends "base.html" %}

{% block title %}
Login - LeadFlow CRM
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow-sm border-0 mt-5">

            <div class="card-body p-4">

                <h2 class="mb-4 text-center">
                    Login
                </h2>

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label">
                            Username
                        </label>

                        <input
                            type="text"
                            name="username"
                            class="form-control"
                        >

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Password
                        </label>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                        >

                    </div>

                    <button
                        type="submit"
                        class="btn btn-dark w-100"
                    >
                        Login
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
